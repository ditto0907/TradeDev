<!DOCTYPE html>
<html>
<head>
  <title>Test Hline Trend Line</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    button { padding: 10px 20px; margin: 5px; background: #0e639c; color: white; border: none; cursor: pointer; }
    button:hover { background: #1177bb; }
    pre { background: #2d2d2d; padding: 10px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Test Hline as Trend Line</h1>
  <p>Test the updated annotation rendering with hline displayed as trend_line</p>
  
  <button onclick="testAnnotation()">POST Test Analysis with Hline</button>
  <button onclick="checkAnalyses()">Check Existing Analyses</button>
  
  <pre id="output"></pre>

  <script>
    const output = document.getElementById('output');
    
    function log(text) {
      output.textContent += new Date().toLocaleTimeString() + ' - ' + text + '\n';
    }
    
    async function testAnnotation() {
      log('Posting test analysis with hline annotations...');
      
      const payload = {
        symbol: "MNQ",
        timeframe: "5",
        session: "RTH",
        bar_from: 1775655000,  // 2026-04-08 09:30
        bar_to: 1775660400,    // 2026-04-08 11:00
        summary: "Test hline as trend_line rendering:\n• S/R lines should extend from start_time to bar_to\n• Text should be positioned bottom-right",
        annotations: [
          {
            label: "Support 25000",
            type: "hline",
            start_time: 1775655000,
            price: 25000.0,
            style: "solid"
            // end_time omitted - should use bar_to (11:00)
          },
          {
            label: "Resistance 25200",
            type: "hline",
            start_time: 1775655000,
            price: 25200.0,
            style: "dashed"
            // end_time omitted
          },
          {
            label: "Custom End Time",
            type: "hline",
            start_time: 1775655000,
            price: 25100.0,
            style: "dotted",
            end_time: 1775658000  // Explicit end time (10:30)
          }
        ]
      };
      
      try {
        const response = await fetch('http://localhost:8000/api/skill/analysis', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        log('✓ Posted successfully, ID: ' + result.id);
        log('Open http://localhost:8000 and check MNQ chart for trend lines');
      } catch (e) {
        log('✗ Error: ' + e.message);
      }
    }
    
    async function checkAnalyses() {
      try {
        const response = await fetch('http://localhost:8000/api/skill/analyses?symbol=MNQ&active_only=true');
        const analyses = await response.json();
        
        log(`Found ${analyses.length} active MNQ analyses:`);
        analyses.forEach(a => {
          log(`  ID ${a.id}: ${a.annotations?.length || 0} annotations, created ${a.created_at}`);
        });
      } catch (e) {
        log('✗ Error: ' + e.message);
      }
    }
  </script>
</body>
</html>
